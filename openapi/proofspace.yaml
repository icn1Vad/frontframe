openapi: 3.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: ProofSpace Backend API
  version: 1.0.0
  description: |
    ProofSpace 前端与后端的 V1 契约。认证使用 HttpOnly Cookie，
    文件使用对象存储预签名上传，AI 任务状态使用轮询。
servers:
  - url: /api/v1
    description: Same-origin API
tags:
  - name: Auth
  - name: Dashboard
  - name: Uploads
  - name: Classification
  - name: ClassificationTasks
  - name: ReviewTasks
  - name: ContractReview
  - name: Knowledge
  - name: Chat
  - name: Documents
security:
  - cookieAuth: []

paths:
  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              username: zhangsan
              password: password
      responses:
        '200':
          description: 登录成功并设置 proofspace_session Cookie
          headers:
            Set-Cookie:
              schema:
                type: string
            X-CSRF-Token:
              $ref: '#/components/headers/CsrfToken'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginEnvelope'
        '400':
          $ref: '#/components/responses/ValidationProblem'
        '401':
          $ref: '#/components/responses/UnauthenticatedProblem'

  /auth/registrations:
    post:
      tags: [Auth]
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: 注册申请状态
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterEnvelope'
        '400':
          $ref: '#/components/responses/ValidationProblem'
        '503':
          $ref: '#/components/responses/ServiceUnavailableProblem'

  /auth/session:
    get:
      tags: [Auth]
      operationId: getSession
      security: []
      responses:
        '200':
          description: 当前会话；未登录时 data 为 null
          headers:
            X-CSRF-Token:
              $ref: '#/components/headers/CsrfToken'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NullableAuthSessionEnvelope'

  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      parameters:
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '204':
          description: 会话已清除
        '401':
          $ref: '#/components/responses/UnauthenticatedProblem'

  /dashboard/overview:
    get:
      tags: [Dashboard]
      operationId: getDashboardOverview
      responses:
        '200':
          description: 工作台资产统计
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardOverviewEnvelope'
        '401':
          $ref: '#/components/responses/UnauthenticatedProblem'
        '403':
          $ref: '#/components/responses/ForbiddenProblem'

  /uploads/initiate:
    post:
      tags: [Uploads]
      operationId: initiateUpload
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitiateUploadRequest'
      responses:
        '200':
          description: 返回短期对象存储 PUT 地址
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresignedUploadEnvelope'
        '400':
          $ref: '#/components/responses/ValidationProblem'
        '413':
          $ref: '#/components/responses/FileTooLargeProblem'
        '415':
          $ref: '#/components/responses/UnsupportedFileProblem'

  /uploads/{uploadId}/complete:
    post:
      tags: [Uploads]
      operationId: completeUpload
      parameters:
        - $ref: '#/components/parameters/UploadId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteUploadRequest'
      responses:
        '200':
          description: 上传已校验并生成稳定文件资源
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadedFileEnvelope'
        '404':
          $ref: '#/components/responses/NotFoundProblem'
        '409':
          $ref: '#/components/responses/ConflictProblem'
    delete:
      tags: [Uploads]
      operationId: abandonUpload
      parameters:
        - $ref: '#/components/parameters/UploadId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '204':
          description: 未完成上传已放弃

  /classification/candidates/stats:
    get:
      tags: [Classification]
      operationId: getClassificationCandidateStats
      responses:
        '200':
          description: 分类候选统计
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassificationStatsEnvelope'

  /classification/candidates:
    get:
      tags: [Classification]
      operationId: listClassificationCandidates
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/DocumentTypeFilter'
        - $ref: '#/components/parameters/DocumentLevelFilter'
        - $ref: '#/components/parameters/DocumentCategoryFilter'
        - $ref: '#/components/parameters/CandidateStateFilter'
      responses:
        '200':
          description: 候选分页
          headers:
            Retry-After:
              $ref: '#/components/headers/RetryAfter'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassificationCandidatePageEnvelope'

  /classification/candidates/batch:
    post:
      tags: [Classification]
      operationId: createClassificationCandidates
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClassificationCandidatesRequest'
      responses:
        '200':
          description: 已创建候选并进入 classifying
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassificationCandidateArrayEnvelope'
        '409':
          $ref: '#/components/responses/ConflictProblem'

  /classification/candidates/{candidateId}/preview:
    get:
      tags: [Classification]
      operationId: getClassificationCandidatePreview
      parameters:
        - $ref: '#/components/parameters/CandidateId'
      responses:
        '200':
          description: 预览；不可预览时 data 为 null
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NullableDocumentPreviewEnvelope'
        '404':
          $ref: '#/components/responses/NotFoundProblem'

  /classification/candidates/batch-confirm:
    post:
      tags: [Classification]
      operationId: confirmClassificationCandidates
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmCandidatesRequest'
      responses:
        '200':
          description: 支持部分成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmedCandidateBatchEnvelope'

  /classification/candidates/batch-delete:
    post:
      tags: [Classification]
      operationId: deleteClassificationCandidates
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteCandidatesRequest'
      responses:
        '200':
          description: 支持部分成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletedCandidateBatchEnvelope'

  /classification-tasks:
    get:
      tags: [ClassificationTasks]
      operationId: listClassificationTasks
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/DocumentTypeFilter'
        - $ref: '#/components/parameters/DocumentLevelFilter'
        - $ref: '#/components/parameters/DocumentStateFilter'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortDirection'
      responses:
        '200':
          description: 分类任务分页
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentPageEnvelope'

  /classification-tasks/{documentId}/preview:
    get:
      tags: [ClassificationTasks]
      operationId: getClassificationTaskPreview
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          $ref: '#/components/responses/NullableDocumentPreviewResponse'

  /classification-tasks/{documentId}/publish:
    post:
      tags: [ClassificationTasks]
      operationId: publishClassificationTask
      parameters:
        - $ref: '#/components/parameters/DocumentId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '200':
          $ref: '#/components/responses/DocumentResponse'
        '409':
          $ref: '#/components/responses/ConflictProblem'

  /classification-tasks/{documentId}/start-review:
    post:
      tags: [ClassificationTasks]
      operationId: startDocumentReview
      parameters:
        - $ref: '#/components/parameters/DocumentId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '200':
          $ref: '#/components/responses/DocumentResponse'
        '409':
          $ref: '#/components/responses/ConflictProblem'

  /classification-tasks/{documentId}:
    delete:
      tags: [ClassificationTasks]
      operationId: deleteClassificationTask
      parameters:
        - $ref: '#/components/parameters/DocumentId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '200':
          $ref: '#/components/responses/DocumentResponse'

  /review-tasks:
    get:
      tags: [ReviewTasks]
      operationId: listReviewTasks
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/DocumentTypeFilter'
        - $ref: '#/components/parameters/DocumentLevelFilter'
        - $ref: '#/components/parameters/DocumentStateFilter'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortDirection'
      responses:
        '200':
          description: 审查任务分页
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentPageEnvelope'

  /review-tasks/{reviewTaskId}/document:
    get:
      tags: [ReviewTasks, Documents]
      operationId: getDocumentByReviewTaskId
      parameters:
        - $ref: '#/components/parameters/ReviewTaskId'
      responses:
        '200':
          description: 来源文档；不可见时 data 为 null
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NullableDocumentEnvelope'

  /review-tasks/{reviewTaskId}/progress:
    get:
      tags: [ReviewTasks]
      operationId: getReviewProgress
      parameters:
        - $ref: '#/components/parameters/ReviewTaskId'
      responses:
        '200':
          description: 审查轮询进度
          headers:
            Retry-After:
              $ref: '#/components/headers/RetryAfter'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewProgressEnvelope'

  /review-tasks/{reviewTaskId}/report:
    get:
      tags: [ReviewTasks]
      operationId: getReviewReport
      parameters:
        - $ref: '#/components/parameters/ReviewTaskId'
      responses:
        '200':
          description: 报告未生成时 data 为 null
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NullableReviewReportEnvelope'

  /review-tasks/{reviewTaskId}/termination-report:
    post:
      tags: [ReviewTasks]
      operationId: createTerminationReport
      parameters:
        - $ref: '#/components/parameters/ReviewTaskId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '200':
          $ref: '#/components/responses/ReviewReportResponse'

  /review-tasks/{reviewTaskId}/risks/{riskId}/resolve:
    post:
      tags: [ReviewTasks]
      operationId: resolveReviewRisk
      parameters:
        - $ref: '#/components/parameters/ReviewTaskId'
        - $ref: '#/components/parameters/RiskId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '200':
          $ref: '#/components/responses/ReviewReportResponse'

  /review-tasks/{reviewTaskId}/risks/{riskId}/ignore:
    post:
      tags: [ReviewTasks]
      operationId: ignoreReviewRisk
      parameters:
        - $ref: '#/components/parameters/ReviewTaskId'
        - $ref: '#/components/parameters/RiskId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        $ref: '#/components/requestBodies/IgnoreReason'
      responses:
        '200':
          $ref: '#/components/responses/ReviewReportResponse'
        '422':
          $ref: '#/components/responses/ValidationProblem'

  /review-tasks/{reviewTaskId}/risks/batch-ignore:
    post:
      tags: [ReviewTasks]
      operationId: ignoreAllReviewRisks
      parameters:
        - $ref: '#/components/parameters/ReviewTaskId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        $ref: '#/components/requestBodies/IgnoreReason'
      responses:
        '200':
          $ref: '#/components/responses/ReviewReportResponse'
        '422':
          $ref: '#/components/responses/ValidationProblem'

  /review-tasks/by-document/{documentId}/publish:
    post:
      tags: [ReviewTasks]
      operationId: publishReviewedDocument
      parameters:
        - $ref: '#/components/parameters/DocumentId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '200':
          $ref: '#/components/responses/DocumentResponse'
        '409':
          $ref: '#/components/responses/ConflictProblem'

  /review-tasks/by-document/{documentId}:
    delete:
      tags: [ReviewTasks]
      operationId: deleteReviewTaskByDocument
      parameters:
        - $ref: '#/components/parameters/DocumentId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '200':
          $ref: '#/components/responses/DocumentResponse'

  /documents/{documentId}:
    get:
      tags: [Documents]
      operationId: getDocument
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: 文档不存在或不可见时 data 为 null
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NullableDocumentEnvelope'

  /contract-review/tasks:
    get:
      tags: [ContractReview]
      operationId: listContractReviewTasks
      responses:
        '200':
          description: 合同专项任务
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractTaskArrayEnvelope'
    post:
      tags: [ContractReview]
      operationId: createContractReviewTask
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContractTaskRequest'
      responses:
        '200':
          $ref: '#/components/responses/ContractTaskResponse'

  /contract-review/tasks/{taskId}:
    get:
      tags: [ContractReview]
      operationId: getContractReviewTask
      parameters:
        - $ref: '#/components/parameters/ContractTaskId'
      responses:
        '200':
          description: 任务不存在或不可见时 data 为 null
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NullableContractTaskEnvelope'

  /contract-review/tasks/{taskId}/editor-session:
    get:
      tags: [ContractReview]
      operationId: getContractEditorSession
      parameters:
        - $ref: '#/components/parameters/ContractTaskId'
      responses:
        '200':
          description: 在线编辑器会话或文本预览降级说明
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractEditorSessionEnvelope'

  /contract-review/tasks/{taskId}/start:
    post:
      tags: [ContractReview]
      operationId: startContractReview
      parameters:
        - $ref: '#/components/parameters/ContractTaskId'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '200':
          $ref: '#/components/responses/ContractTaskResponse'
        '409':
          $ref: '#/components/responses/ConflictProblem'

  /contract-review/tasks/{taskId}/report:
    post:
      tags: [ContractReview]
      operationId: generateContractReport
      parameters:
        - $ref: '#/components/parameters/ContractTaskId'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '200':
          $ref: '#/components/responses/ContractTaskResponse'

  /contract-review/tasks/{taskId}/risks/{riskId}:
    patch:
      tags: [ContractReview]
      operationId: updateContractRisk
      parameters:
        - $ref: '#/components/parameters/ContractTaskId'
        - $ref: '#/components/parameters/RiskId'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateContractRiskRequest'
      responses:
        '200':
          $ref: '#/components/responses/ContractTaskResponse'
        '422':
          $ref: '#/components/responses/ValidationProblem'

  /contract-review/tasks/{taskId}/store:
    post:
      tags: [ContractReview]
      operationId: storeContractReview
      parameters:
        - $ref: '#/components/parameters/ContractTaskId'
        - $ref: '#/components/parameters/IfMatch'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '200':
          $ref: '#/components/responses/ContractTaskResponse'
        '409':
          $ref: '#/components/responses/ConflictProblem'

  /knowledge:
    get:
      tags: [Knowledge]
      operationId: listKnowledge
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/DocumentTypeFilter'
        - $ref: '#/components/parameters/DocumentLevelFilter'
        - $ref: '#/components/parameters/DocumentStateFilter'
        - $ref: '#/components/parameters/SortBy'
        - $ref: '#/components/parameters/SortDirection'
      responses:
        '200':
          description: 知识分页
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentPageEnvelope'

  /knowledge/graph:
    get:
      tags: [Knowledge]
      operationId: getKnowledgeGraph
      responses:
        '200':
          description: 知识关系图
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeGraphEnvelope'

  /knowledge/{documentId}/preview:
    get:
      tags: [Knowledge]
      operationId: getKnowledgePreview
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          $ref: '#/components/responses/NullableDocumentPreviewResponse'

  /knowledge/{documentId}/report:
    get:
      tags: [Knowledge]
      operationId: getKnowledgeReport
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          $ref: '#/components/responses/NullableDocumentPreviewResponse'

  /knowledge/{documentId}:
    delete:
      tags: [Knowledge]
      operationId: deleteKnowledge
      parameters:
        - $ref: '#/components/parameters/DocumentId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '200':
          $ref: '#/components/responses/DocumentResponse'

  /chat/conversations:
    get:
      tags: [Chat]
      operationId: listChatConversations
      responses:
        '200':
          description: 提问集
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatConversationArrayEnvelope'
    post:
      tags: [Chat]
      operationId: createChatConversation
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConversationRequest'
      responses:
        '200':
          $ref: '#/components/responses/ChatConversationResponse'

  /chat/conversations/{conversationId}:
    get:
      tags: [Chat]
      operationId: getChatConversation
      parameters:
        - $ref: '#/components/parameters/ConversationId'
      responses:
        '200':
          description: 提问集不存在时 data 为 null
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NullableChatConversationEnvelope'
    delete:
      tags: [Chat]
      operationId: deleteChatConversation
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      responses:
        '204':
          description: 提问集已删除

  /chat/conversations/{conversationId}/messages:
    post:
      tags: [Chat]
      operationId: sendChatMessage
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - $ref: '#/components/parameters/IdempotencyKey'
        - $ref: '#/components/parameters/CsrfToken'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendMessageRequest'
      responses:
        '200':
          description: 带知识引用的回答
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessageEnvelope'

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: proofspace_session

  headers:
    CsrfToken:
      description: 当前会话的短期 CSRF Token
      schema:
        type: string
    RetryAfter:
      description: 建议下次轮询前等待的秒数
      schema:
        type: integer
        minimum: 1
        maximum: 30

  parameters:
    CsrfToken:
      name: X-CSRF-Token
      in: header
      required: true
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 128
    IfMatch:
      name: If-Match
      in: header
      required: true
      description: 合同任务版本，例如 `"3"`
      schema:
        type: string
        pattern: '^"[0-9]+"$'
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: pageSize
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    Search:
      name: search
      in: query
      schema:
        type: string
        maxLength: 200
    SortBy:
      name: sortBy
      in: query
      schema:
        type: string
        enum: [name, updatedAt]
    SortDirection:
      name: sortDirection
      in: query
      schema:
        type: string
        enum: [asc, desc]
    DocumentTypeFilter:
      name: type
      in: query
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: '#/components/schemas/DocumentType'
    DocumentLevelFilter:
      name: level
      in: query
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: '#/components/schemas/DocumentLevel'
    DocumentCategoryFilter:
      name: category
      in: query
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: '#/components/schemas/DocumentCategory'
    DocumentStateFilter:
      name: state
      in: query
      style: form
      explode: true
      schema:
        type: array
        items:
          type: string
          enum: [pending, classified, reviewing, reviewed, published, deleted]
    CandidateStateFilter:
      name: state
      in: query
      style: form
      explode: true
      schema:
        type: array
        items:
          $ref: '#/components/schemas/ClassificationCandidateState'
    DocumentId:
      name: documentId
      in: path
      required: true
      schema:
        type: string
    CandidateId:
      name: candidateId
      in: path
      required: true
      schema:
        type: string
    ReviewTaskId:
      name: reviewTaskId
      in: path
      required: true
      schema:
        type: string
    ContractTaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: string
    RiskId:
      name: riskId
      in: path
      required: true
      schema:
        type: string
    UploadId:
      name: uploadId
      in: path
      required: true
      schema:
        type: string
    ConversationId:
      name: conversationId
      in: path
      required: true
      schema:
        type: string

  requestBodies:
    IgnoreReason:
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/IgnoreRiskRequest'

  responses:
    DocumentResponse:
      description: 更新后的文档
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DocumentEnvelope'
    ReviewReportResponse:
      description: 更新后的审查报告
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ReviewReportEnvelope'
    ContractTaskResponse:
      description: 更新后的合同任务
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ContractTaskEnvelope'
    ChatConversationResponse:
      description: 提问集
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ChatConversationEnvelope'
    NullableDocumentPreviewResponse:
      description: 预览；无内容时 data 为 null
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NullableDocumentPreviewEnvelope'
    ValidationProblem:
      description: 请求校验失败
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    UnauthenticatedProblem:
      description: 未登录或会话过期
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    ForbiddenProblem:
      description: 权限不足
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFoundProblem:
      description: 资源不存在
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    ConflictProblem:
      description: 版本、幂等或状态冲突
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    FileTooLargeProblem:
      description: 文件超过限制
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    UnsupportedFileProblem:
      description: 文件类型不支持
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    ServiceUnavailableProblem:
      description: 服务暂不可用
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

  schemas:
    Envelope:
      type: object
      required: [data]
      properties:
        data: {}
        traceId:
          type: string

    Problem:
      type: object
      required: [title, status, code]
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          minimum: 400
          maximum: 599
        code:
          type: string
        detail:
          type: string
        traceId:
          type: string
        retryable:
          type: boolean
        fieldErrors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'

    FieldError:
      type: object
      required: [field, message]
      properties:
        field:
          type: string
        code:
          type: string
        message:
          type: string

    LoginRequest:
      type: object
      additionalProperties: false
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 100
        password:
          type: string
          minLength: 8
          maxLength: 256

    RegisterRequest:
      type: object
      additionalProperties: false
      required: [username, password, requestedRole]
      properties:
        username:
          type: string
          minLength: 1
          maxLength: 100
        password:
          type: string
          minLength: 8
          maxLength: 256
        requestedRole:
          type: string
          enum: [user, admin]

    AuthUser:
      type: object
      required: [id, username, displayName, roleLabel, permissions]
      properties:
        id:
          type: string
        username:
          type: string
        displayName:
          type: string
        roleLabel:
          type: string
        permissions:
          type: array
          uniqueItems: true
          items:
            type: string
            pattern: '^[a-z-]+:[a-z-]+$'

    AuthSession:
      type: object
      required: [user, expiresAt, csrfToken]
      properties:
        user:
          $ref: '#/components/schemas/AuthUser'
        expiresAt:
          type: string
          format: date-time
        csrfToken:
          type: string

    LoginResult:
      type: object
      required: [status, message, session]
      properties:
        status:
          const: authenticated
        message:
          type: string
        session:
          $ref: '#/components/schemas/AuthSession'

    RegisterResult:
      type: object
      required: [status, message]
      properties:
        status:
          type: string
          enum: [submitted, unavailable]
        message:
          type: string

    LoginEnvelope:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/LoginResult'

    RegisterEnvelope:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/RegisterResult'

    NullableAuthSessionEnvelope:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              oneOf:
                - $ref: '#/components/schemas/AuthSession'
                - type: 'null'

    DashboardMetric:
      type: object
      required: [label, value]
      properties:
        label:
          type: string
        value:
          type: string

    DashboardOverview:
      type: object
      additionalProperties: false
      required: [metrics]
      properties:
        metrics:
          type: array
          items:
            $ref: '#/components/schemas/DashboardMetric'

    DashboardOverviewEnvelope:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/DashboardOverview'

    InitiateUploadRequest:
      type: object
      additionalProperties: false
      required: [fileName, size, contentType, lastModified]
      properties:
        fileName:
          type: string
          minLength: 1
          maxLength: 255
        size:
          type: integer
          minimum: 1
          maximum: 52428800
        contentType:
          type: string
        lastModified:
          type: integer
          minimum: 0

    CompleteUploadRequest:
      type: object
      additionalProperties: false
      properties:
        etag:
          type: string

    PresignedUploadSession:
      type: object
      required: [uploadId, uploadUrl, method, headers, expiresAt]
      properties:
        uploadId:
          type: string
        uploadUrl:
          type: string
          format: uri
        method:
          const: PUT
        headers:
          type: object
          additionalProperties:
            type: string
        expiresAt:
          type: string
          format: date-time

    UploadedFileResource:
      type: object
      required: [id, name, size, contentType, status, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string
        status:
          const: ready
        createdAt:
          type: string
          format: date-time

    PresignedUploadEnvelope:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/PresignedUploadSession'

    UploadedFileEnvelope:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/UploadedFileResource'

    DocumentType:
      type: string
      enum: [policy, contract, report, other]

    DocumentLevel:
      type: string
      enum: [company, department, external-standard]

    DocumentCategory:
      type: string
      enum: [procurement, contract, supply-chain, administration, external-standard]

    UserSummary:
      type: object
      required: [id, displayName]
      properties:
        id:
          type: string
        displayName:
          type: string

    PendingState:
      type: object
      required: [kind, queuedAt]
      properties:
        kind:
          const: pending
        queuedAt:
          type: string
          format: date-time

    ClassifiedState:
      type: object
      required: [kind, classifiedAt]
      properties:
        kind:
          const: classified
        classifiedAt:
          type: string
          format: date-time

    ReviewingState:
      type: object
      required: [kind, reviewTaskId, startedAt, progress]
      properties:
        kind:
          const: reviewing
        reviewTaskId:
          type: string
        startedAt:
          type: string
          format: date-time
        progress:
          type: number
          minimum: 0
          maximum: 100

    ReviewedState:
      type: object
      required: [kind, reviewTaskId, reviewedAt]
      properties:
        kind:
          const: reviewed
        reviewTaskId:
          type: string
        reviewedAt:
          type: string
          format: date-time

    PublishedClassificationState:
      type: object
      required: [kind, source, publishedAt]
      properties:
        kind:
          const: published
        source:
          const: classification
        publishedAt:
          type: string
          format: date-time

    PublishedReviewState:
      type: object
      required: [kind, source, reviewTaskId, publishedAt]
      properties:
        kind:
          const: published
        source:
          const: review
        reviewTaskId:
          type: string
        publishedAt:
          type: string
          format: date-time

    PublishedContractState:
      type: object
      required: [kind, source, contractTaskId, publishedAt]
      properties:
        kind:
          const: published
        source:
          const: contract-review
        contractTaskId:
          type: string
        publishedAt:
          type: string
          format: date-time

    DeletedState:
      type: object
      required: [kind, deletedAt]
      properties:
        kind:
          const: deleted
        deletedAt:
          type: string
          format: date-time
        previousKind:
          type: string
          enum: [pending, classified, reviewing, reviewed, published]
        reviewTaskId:
          type: string
        contractTaskId:
          type: string
        reason:
          type: string
          enum: [user-action, knowledge-deleted]

    DocumentState:
      oneOf:
        - $ref: '#/components/schemas/PendingState'
        - $ref: '#/components/schemas/ClassifiedState'
        - $ref: '#/components/schemas/ReviewingState'
        - $ref: '#/components/schemas/ReviewedState'
        - $ref: '#/components/schemas/PublishedClassificationState'
        - $ref: '#/components/schemas/PublishedReviewState'
        - $ref: '#/components/schemas/PublishedContractState'
        - $ref: '#/components/schemas/DeletedState'

    DocumentSummary:
      type: object
      required: [id, name, type, level, category, state, operator]
      properties:
        id:
          type: string
        name:
          type: string
        type:
          $ref: '#/components/schemas/DocumentType'
        level:
          $ref: '#/components/schemas/DocumentLevel'
        category:
          $ref: '#/components/schemas/DocumentCategory'
        state:
          $ref: '#/components/schemas/DocumentState'
        operator:
          $ref: '#/components/schemas/UserSummary'

    DocumentPage:
      type: object
      required: [items, page, pageSize, total, pageCount]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/DocumentSummary'
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        pageCount:
          type: integer
          minimum: 0

    DocumentEnvelope:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/DocumentSummary'

    NullableDocumentEnvelope:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              oneOf:
                - $ref: '#/components/schemas/DocumentSummary'
                - type: 'null'

    DocumentPageEnvelope:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/DocumentPage'

    DocumentPreview:
      type: object
      required: [documentName, content]
      properties:
        documentName:
          type: string
        content:
          type: string

    NullableDocumentPreviewEnvelope:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              oneOf:
                - $ref: '#/components/schemas/DocumentPreview'
                - type: 'null'

    ClassificationCandidateState:
      type: string
      enum: [classifying, awaiting-confirmation]

    ClassificationCandidate:
      type: object
      required: [id, name, type, level, category, state, version]
      properties:
        id:
          type: string
        name:
          type: string
        type:
          $ref: '#/components/schemas/DocumentType'
        level:
          $ref: '#/components/schemas/DocumentLevel'
        category:
          $ref: '#/components/schemas/DocumentCategory'
        state:
          $ref: '#/components/schemas/ClassificationCandidateState'
        version:
          type: integer
          minimum: 1

    ClassificationStats:
      type: object
      required: [total, classifying, awaitingConfirmation]
      properties:
        total:
          type: integer
          minimum: 0
        classifying:
          type: integer
          minimum: 0
        awaitingConfirmation:
          type: integer
          minimum: 0

    ClassificationCandidatePage:
      type: object
      required: [items, page, pageSize, total, pageCount]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ClassificationCandidate'
        page:
          type: integer
          minimum: 1
        pageSize:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        pageCount:
          type: integer
          minimum: 0

    CreateClassificationCandidatesRequest:
      type: object
      additionalProperties: false
      required: [files]
      properties:
        files:
          type: array
          minItems: 1
          maxItems: 20
          items:
            type: object
            required: [fileId]
            properties:
              fileId:
                type: string

    ConfirmCandidateInput:
      type: object
      additionalProperties: false
      required: [id, name, type, level, category, expectedVersion, manualOverride]
      properties:
        id:
          type: string
        name:
          type: string
        type:
          $ref: '#/components/schemas/DocumentType'
        level:
          $ref: '#/components/schemas/DocumentLevel'
        category:
          $ref: '#/components/schemas/DocumentCategory'
        expectedVersion:
          type: integer
          minimum: 1
        manualOverride:
          type: boolean

    ConfirmCandidatesRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ConfirmCandidateInput'

    VersionedCandidateInput:
      type: object
      required: [id, expectedVersion]
      properties:
        id:
          type: string
        expectedVersion:
          type: integer
          minimum: 1

    DeleteCandidatesRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/VersionedCandidateInput'

    BatchFailure:
      type: object
      required: [id, code, message]
      properties:
        id:
          type: string
        code:
          type: string
          enum: [not-found, validation, conflict, unavailable]
        message:
          type: string

    ConfirmedCandidate:
      type: object
      required: [candidateId, document]
      properties:
        candidateId:
          type: string
        document:
          $ref: '#/components/schemas/DocumentSummary'

    ConfirmedCandidateBatch:
      type: object
      required: [succeeded, failed]
      properties:
        succeeded:
          type: array
          items:
            $ref: '#/components/schemas/ConfirmedCandidate'
        failed:
          type: array
          items:
            $ref: '#/components/schemas/BatchFailure'

    DeletedCandidateBatch:
      type: object
      required: [succeeded, failed]
      properties:
        succeeded:
          type: array
          items:
            $ref: '#/components/schemas/ClassificationCandidate'
        failed:
          type: array
          items:
            $ref: '#/components/schemas/BatchFailure'

    ClassificationStatsEnvelope:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ClassificationStats'

    ClassificationCandidatePageEnvelope:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ClassificationCandidatePage'

    ClassificationCandidateArrayEnvelope:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/ClassificationCandidate'

    ConfirmedCandidateBatchEnvelope:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ConfirmedCandidateBatch'

    DeletedCandidateBatchEnvelope:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/DeletedCandidateBatch'

    ReviewRiskResolution:
      type: object
      required: [operator, handledAt]
      properties:
        operator:
          type: string
        handledAt:
          type: string
          format: date-time
        reason:
          type: string

    ReviewRisk:
      type: object
      required: [id, category, level, title, summary, evidence, suggestion, state]
      properties:
        id:
          type: string
        category:
          type: string
          enum: [semantic, conflict, consistency]
        level:
          type: string
          enum: [high, medium, low]
        title:
          type: string
        summary:
          type: string
        evidence:
          type: string
        suggestion:
          type: string
        state:
          type: string
          enum: [open, resolved, ignored]
        resolution:
          $ref: '#/components/schemas/ReviewRiskResolution'

    ReviewTermination:
      type: object
      required: [progress, discoveredRiskCount, operator, terminatedAt]
      properties:
        progress:
          type: number
          minimum: 0
          maximum: 100
        discoveredRiskCount:
          type: integer
          minimum: 0
        operator:
          type: string
        terminatedAt:
          type: string
          format: date-time

    ReviewReport:
      type: object
      required: [taskId, documentName, summary, risks]
      properties:
        taskId:
          type: string
        documentName:
          type: string
        summary:
          type: string
        risks:
          type: array
          items:
            $ref: '#/components/schemas/ReviewRisk'
        termination:
          $ref: '#/components/schemas/ReviewTermination'

    ReviewProgress:
      type: object
      required: [progress]
      properties:
        progress:
          type: number
          minimum: 0
          maximum: 100

    IgnoreRiskRequest:
      type: object
      additionalProperties: false
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 2000

    ReviewReportEnvelope:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ReviewReport'

    NullableReviewReportEnvelope:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              oneOf:
                - $ref: '#/components/schemas/ReviewReport'
                - type: 'null'

    ReviewProgressEnvelope:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ReviewProgress'

    ContractClause:
      type: object
      required: [id, number, title, text]
      properties:
        id:
          type: string
        number:
          type: string
        title:
          type: string
        text:
          type: string

    ContractRiskResolution:
      type: object
      required: [operator, handledAt]
      properties:
        operator:
          type: string
        handledAt:
          type: string
          format: date-time
        reason:
          type: string

    ContractRisk:
      type: object
      required: [id, clauseId, moduleId, level, title, summary, suggestion, originalText, state]
      properties:
        id:
          type: string
        clauseId:
          type: string
        moduleId:
          type: string
          enum: [transaction, performance-payment, compliance, data-security, intellectual-property, termination]
        level:
          type: string
          enum: [high, medium, low]
        title:
          type: string
        summary:
          type: string
        suggestion:
          type: string
        originalText:
          type: string
        state:
          type: string
          enum: [open, resolved, ignored]
        resolution:
          $ref: '#/components/schemas/ContractRiskResolution'

    ContractReviewTask:
      type: object
      required: [id, version, name, size, stance, modules, status, progress, createdAt, clauses, risks]
      properties:
        id:
          type: string
        version:
          type: integer
          minimum: 1
        name:
          type: string
        size:
          type: integer
          minimum: 1
        stance:
          type: string
          enum: [party-a, party-b, neutral]
        modules:
          type: array
          uniqueItems: true
          items:
            type: string
            enum: [transaction, performance-payment, compliance, data-security, intellectual-property, termination]
        status:
          type: string
          enum: [queued, reviewing, reported, stored]
        progress:
          type: number
          minimum: 0
          maximum: 100
        createdAt:
          type: string
          format: date-time
        clauses:
          type: array
          items:
            $ref: '#/components/schemas/ContractClause'
        risks:
          type: array
          items:
            $ref: '#/components/schemas/ContractRisk'

    CreateContractTaskRequest:
      type: object
      additionalProperties: false
      required: [fileId, name, stance, modules]
      properties:
        fileId:
          type: string
        name:
          type: string
        stance:
          type: string
          enum: [party-a, party-b, neutral]
        modules:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum: [transaction, performance-payment, compliance, data-security, intellectual-property, termination]

    UpdateContractRiskRequest:
      type: object
      additionalProperties: false
      required: [state]
      properties:
        state:
          type: string
          enum: [open, resolved, ignored]
        reason:
          type: string
          maxLength: 2000
      allOf:
        - if:
            properties:
              state:
                const: ignored
          then:
            required: [reason]

    ContractTaskEnvelope:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ContractReviewTask'

    NullableContractTaskEnvelope:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              oneOf:
                - $ref: '#/components/schemas/ContractReviewTask'
                - type: 'null'

    ContractTaskArrayEnvelope:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/ContractReviewTask'

    MockEditorSession:
      type: object
      required: [provider, reason]
      properties:
        provider:
          const: mock
        reason:
          type: string

    WpsToken:
      type: object
      required: [token, timeout]
      properties:
        token:
          type: string
        timeout:
          type: integer
          minimum: 1

    WpsEditorSession:
      type: object
      required: [provider, sdkUrl, appId, fileId]
      properties:
        provider:
          const: wps
        sdkUrl:
          type: string
        appId:
          type: string
        fileId:
          type: string
        token:
          oneOf:
            - type: string
            - $ref: '#/components/schemas/WpsToken'
        endpoint:
          type: string
        refreshTokenUrl:
          type: string
        mode:
          type: string
          enum: [normal, simple]
        customArgs:
          type: object
          additionalProperties:
            oneOf:
              - type: string
              - type: number
              - type: boolean

    ContractEditorSession:
      oneOf:
        - $ref: '#/components/schemas/MockEditorSession'
        - $ref: '#/components/schemas/WpsEditorSession'
      discriminator:
        propertyName: provider

    ContractEditorSessionEnvelope:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ContractEditorSession'

    KnowledgeGraphNode:
      type: object
      required: [id, label]
      properties:
        id:
          type: string
        label:
          type: string

    KnowledgeGraphEdge:
      type: object
      required: [source, target, relation]
      properties:
        source:
          type: string
        target:
          type: string
        relation:
          type: string

    KnowledgeGraph:
      type: object
      required: [nodes, edges]
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/KnowledgeGraphNode'
        edges:
          type: array
          items:
            $ref: '#/components/schemas/KnowledgeGraphEdge'

    KnowledgeGraphEnvelope:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/KnowledgeGraph'

    ChatCitation:
      type: object
      required: [documentId, documentName, excerpt]
      properties:
        documentId:
          type: string
        documentName:
          type: string
        excerpt:
          type: string

    ChatMessage:
      type: object
      required: [id, role, content, createdAt, citations]
      properties:
        id:
          type: string
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        createdAt:
          type: string
          format: date-time
        citations:
          type: array
          items:
            $ref: '#/components/schemas/ChatCitation'

    ChatConversation:
      type: object
      required: [id, title, createdAt, updatedAt, messages]
      properties:
        id:
          type: string
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'

    CreateConversationRequest:
      type: object
      additionalProperties: false
      properties:
        title:
          type: string
          maxLength: 100

    SendMessageRequest:
      type: object
      additionalProperties: false
      required: [question]
      properties:
        question:
          type: string
          minLength: 1
          maxLength: 4000

    ChatConversationEnvelope:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ChatConversation'

    NullableChatConversationEnvelope:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              oneOf:
                - $ref: '#/components/schemas/ChatConversation'
                - type: 'null'

    ChatConversationArrayEnvelope:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/ChatConversation'

    ChatMessageEnvelope:
      allOf:
        - $ref: '#/components/schemas/Envelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ChatMessage'
